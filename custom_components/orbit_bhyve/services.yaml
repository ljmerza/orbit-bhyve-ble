start_watering:
  name: Start watering
  description: Start watering on a specific zone for a given duration.
  target:
    entity:
      integration: orbit_bhyve
      domain: valve
  fields:
    duration:
      name: Duration
      description: How long to water, in seconds.
      required: false
      example: 300
      default: 600
      selector:
        number:
          min: 1
          max: 65535
          unit_of_measurement: seconds
          mode: box

stop_all:
  name: Stop all
  description: Stop all watering on every configured B-Hyve device.

refresh_devices:
  name: Refresh devices from cloud
  description: Re-query the Orbit cloud for new/changed devices and updated network keys. Manual; no background polling.

set_program:
  name: Set watering program
  description: Create or replace a watering program (slots A–D) on a B-Hyve valve (HT34A / HT25G2). Choose exactly one day-mode.
  target:
    device:
      integration: orbit_bhyve
  fields:
    slot:
      name: Program slot
      description: Which program slot to write (A–D).
      required: true
      example: A
      selector:
        select:
          options: [A, B, C, D]
    day_mode:
      name: Day mode
      description: How often the program runs. Exactly one mode.
      required: true
      example: weekdays
      selector:
        select:
          options: [weekdays, interval, odd, even, once]
    weekdays:
      name: Weekdays
      description: For day mode "weekdays" — which days to run.
      required: false
      example: "[mon, wed, fri]"
      selector:
        select:
          multiple: true
          options: [sun, mon, tue, wed, thu, fri, sat]
    interval_days:
      name: Interval (days)
      description: For day mode "interval" — run every N days.
      required: false
      example: 3
      selector:
        number:
          min: 1
          max: 31
          mode: box
    interval_anchor:
      name: Interval anchor date
      description: For day mode "interval" — ISO date the interval counts from (default today).
      required: false
      example: "2026-07-01T00:00:00-04:00"
      selector:
        text:
    start_times:
      name: Start times
      description: One or more start times (HH:MM, device-local).
      required: true
      example: "[06:00, 18:00]"
      selector:
        object:
    zones:
      name: Zones
      description: Per-zone run time — a list of {zone, minutes}.
      required: true
      example: "[{zone: 1, minutes: 5}, {zone: 2, minutes: 7}]"
      selector:
        object:
    name:
      name: Program name
      description: Optional label stored on the device.
      required: false
      example: Front lawn
      selector:
        text:
    budget:
      name: Seasonal budget (%)
      description: Seasonal adjust percentage (default 100).
      required: false
      default: 100
      example: 100
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: "%"
          mode: box
    enabled:
      name: Enable
      description: Enable and arm the program (runs the store→enable→autoMode handshake) so it runs on schedule.
      required: false
      default: false
      selector:
        boolean:

delete_program:
  name: Delete watering program
  description: Clear a watering program slot (A–D) on a B-Hyve valve (HT34A / HT25G2).
  target:
    device:
      integration: orbit_bhyve
  fields:
    slot:
      name: Program slot
      description: Which program slot to clear (A–D).
      required: true
      example: A
      selector:
        select:
          options: [A, B, C, D]

get_program:
  name: Get watering program(s)
  description: Read back the stored watering programs (A–D) from a B-Hyve valve (HT34A / HT25G2). Returns a response.
  target:
    device:
      integration: orbit_bhyve
  fields:
    slot:
      name: Program slot
      description: Optional — a single slot (A–D). Omit to return all slots.
      required: false
      example: A
      selector:
        select:
          options: [A, B, C, D]

probe_status:
  name: Probe device status (debug)
  description: Force a fresh BLE connect + 8-step init on a device. No actuation. Decoded plaintext lands in the HA log via connection._on_notify. Used for protocol decoding work (e.g., finding battery bytes).
  fields:
    mac:
      name: MAC address
      description: Device MAC, e.g. 44:67:55:52:99:01.
      required: true
      example: "44:67:55:52:99:01"
      selector:
        text:

probe_send:
  name: Probe send frame (debug)
  description: Send an arbitrary inner-plaintext frame to a device; decoded replies land in the HA log via connection._on_notify. For reverse-engineering only — connection.encrypt() adds the [magic][len]..[trailer] wrapper around the hex you supply.
  fields:
    mac:
      name: MAC address
      description: Device MAC, e.g. 44:67:55:52:99:01.
      required: true
      example: "44:67:55:52:99:01"
      selector:
        text:
    plaintext:
      name: Plaintext (hex)
      description: Inner frame as hex, e.g. an HT34A protobuf query AA775A0F....
      required: true
      example: "aa775a0f02007a0012cd"
      selector:
        text:
    magic:
      name: Magic byte override
      description: Optional. Override frame_magic/trailer_const (0-255); forces a reconnect so the new magic takes effect.
      required: false
      example: 17
      selector:
        number:
          min: 0
          max: 255
          mode: box
    drain_ms:
      name: Drain window (ms)
      description: How long to collect notification replies after the write.
      required: false
      default: 2000
      example: 2000
      selector:
        number:
          min: 100
          max: 10000
          unit_of_measurement: milliseconds
          mode: box
